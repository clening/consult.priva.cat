<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carey Lening — Privacat Insights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../ui_kits/web/styles.css">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="../assets/favicon.svg">
<style>
  body.hide-joi .pc-joi { display: none; }
</style>
</head>
<body class="has-variant-bar">

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- UI kit components -->
<script type="text/babel" src="../ui_kits/web/Button.jsx"></script>
<script type="text/babel" src="../ui_kits/web/Nav.jsx"></script>
<script type="text/babel" src="../ui_kits/web/Hero.jsx"></script>
<script type="text/babel" src="../ui_kits/web/About.jsx"></script>
<script type="text/babel" src="../ui_kits/web/ServiceCard.jsx"></script>
<script type="text/babel" src="../ui_kits/web/Services.jsx"></script>
<script type="text/babel" src="../ui_kits/web/TopicTag.jsx"></script>
<script type="text/babel" src="../ui_kits/web/NewsletterCard.jsx"></script>
<script type="text/babel" src="../ui_kits/web/Newsletter.jsx"></script>
<script type="text/babel" src="../ui_kits/web/Contact.jsx"></script>

<!-- Site-specific additions -->
<script type="text/babel" src="HeroEditorial.jsx"></script>
<script type="text/babel" src="PressStrip.jsx"></script>
<script type="text/babel" src="FootExtras.jsx"></script>
<script type="text/babel" src="FooterFull.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="site-tweaks.jsx"></script>

<script type="text/babel">
const SITE_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "red",
  "density": 1,
  "radius": 4
}/*EDITMODE-END*/;

function VariantBar({ variant, onSelect }) {
  return (
    <div className="site-variant-bar">
      <span className="site-variant-label">Variant —</span>
      <button
        className={variant === 'a' ? 'is-active' : ''}
        onClick={() => onSelect('a')}
      >A · Editorial dark</button>
      <button
        className={variant === 'b' ? 'is-active' : ''}
        onClick={() => onSelect('b')}
      >B · Masthead light</button>
    </div>
  );
}

function App() {
  const [variant, setVariant] = React.useState(() => (location.hash.slice(1) === 'b' ? 'b' : 'a'));
  const [active, setActive] = React.useState('top');
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => {
    const onHash = () => setVariant(location.hash.slice(1) === 'b' ? 'b' : 'a');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const selectVariant = (v) => {
    location.hash = v;
    setVariant(v);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const flash = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  const navigate = (id) => {
    setActive(id);
    if (id === 'top') {
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 80;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  };

  React.useEffect(() => {
    const ids = ['top', 'about', 'services', 'writing', 'contact'];
    const onScroll = () => {
      const scrollY = window.scrollY + 140;
      let current = 'top';
      for (const id of ids) {
        const el = id === 'top' ? null : document.getElementById(id);
        if (el && el.offsetTop <= scrollY) current = id;
      }
      setActive(current);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [variant]);

  const copyEmail = () => {
    if (navigator.clipboard) navigator.clipboard.writeText('carey@priva.cat').catch(() => {});
    flash('Copied carey@priva.cat — drop a line.');
  };
  const subscribe = (email) => flash(email ? `Would subscribe ${email} via Substack.` : 'Opening Substack…');
  const book = () => flash('Calendar would open here.');
  const heroCTA = (target) => navigate(target || 'writing');

  return (
    <>
      <VariantBar variant={variant} onSelect={selectVariant} />
      <Nav active={active} onNavigate={navigate} />
      {variant === 'b'
        ? <HeroEditorial onCTA={heroCTA} />
        : <Hero onCTA={heroCTA} />}
      <About />
      <Services />
      <Newsletter onSubscribe={subscribe} />
      <Contact onCopyEmail={copyEmail} onBook={book} />
      <PressStrip />
      <FootExtras onSubscribe={subscribe} />
      <FooterFull />
      <SiteTweaks />
      <div className={`pc-toast ${toast ? 'is-shown' : ''}`}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
